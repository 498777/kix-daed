name: Build daed Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'daed/Makefile'

jobs:
  check_and_update:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.check.outputs.update_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Upstream Updates
        id: check
        run: |
          UPSTREAM_DAED=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          UPSTREAM_WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)

          CURRENT_DAED=$(grep "PKG_SOURCE_VERSION:=" daed/Makefile | cut -d= -f2)
          CURRENT_WING=$(grep "WING_VERSION:=wing-" daed/Makefile | sed 's/.*wing-//' | head -n 1)
          CURRENT_CORE=$(grep "CORE_VERSION:=core-" daed/Makefile | sed 's/.*core-//' | head -n 1)

          if [ "$UPSTREAM_DAED" != "$CURRENT_DAED" ] || [ "$UPSTREAM_WING" != "$CURRENT_WING" ] || [ "$UPSTREAM_CORE" != "$CURRENT_CORE" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Makefile
        if: steps.check.outputs.update_needed == 'true'
        run: |
          sudo apt-get install -y dos2unix
          find . -type f -exec dos2unix {} \;
          
          date_daed_iso=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.commit.committer.date')
          date_wing_iso=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.commit.committer.date')
          date_core_iso=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.commit.committer.date')
          latest_iso_date=$(echo -e "$date_daed_iso\n$date_wing_iso\n$date_core_iso" | sort -r | head -n 1)
          pkg_version=$(date -d "$latest_iso_date" +%Y.%m.%d)
          
          latest_commit=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha' | cut -b 1-7)
          latest_wing_commit=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          latest_core_commit=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)
          latest_commit_full=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')

          sed -i "/PKG_VERSION:=/c\PKG_VERSION:=$pkg_version" ./daed/Makefile
          sed -i "/DAED_VERSION:=/c\DAED_VERSION:=daed-$latest_commit" ./daed/Makefile
          sed -i "/WING_VERSION:=/c\WING_VERSION:=wing-$latest_wing_commit" ./daed/Makefile
          sed -i "/CORE_VERSION:=/c\CORE_VERSION:=core-$latest_core_commit" ./daed/Makefile
          sed -i "/PKG_SOURCE_VERSION:=/c\PKG_SOURCE_VERSION:=$latest_commit_full" ./daed/Makefile

      - name: Push changes
        if: steps.check.outputs.update_needed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          branch: main

  build:
    name: Build ${{ matrix.arch }}
    needs: check_and_update
    if: needs.check_and_update.outputs.update_needed == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk: openwrt-24.10
          - arch: aarch64_generic
            sdk: openwrt-24.10

    steps:
      - uses: actions/checkout@v4

      - name: Prepare SDK Workspace
        run: |
          # 建立独立的 feed 目录，仅包含 daed 核心
          mkdir -p custom_feed
          cp -r daed custom_feed/

      - name: Building via SDK
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: my_local_feed
          FEEDDIR: ${{ github.workspace }}/custom_feed
          PACKAGES: daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract Binary
        run: |
          # 搜索生成的 ipk 文件
          IPK_FILE=$(find bin/packages/${{ matrix.arch }}/my_local_feed/ -name "daed_*.ipk" | head -n 1)
          if [ -z "$IPK_FILE" ]; then 
            echo "Error: IPK not found!"
            find bin/ -name "*.ipk"
            exit 1 
          fi
          mkdir -p ./extract
          # 从 IPK 的 data.tar.gz 中解压出二进制文件
          tar -xOf "$IPK_FILE" data.tar.gz | tar -xzC ./extract ./usr/bin/daed
          mv ./extract/usr/bin/daed ./daed-${{ matrix.arch }}

      - name: Create Release
        id: release
        run: |
          latest_commit=$(grep "DAED_VERSION:=daed-" daed/Makefile | sed 's/.*daed-//' | head -n 1)
          latest_wing_commit=$(grep "WING_VERSION:=wing-" daed/Makefile | sed 's/.*wing-//' | head -n 1)
          latest_core_commit=$(grep "CORE_VERSION:=core-" daed/Makefile | sed 's/.*core-//' | head -n 1)
          VERSION="$latest_commit-wing_$latest_wing_commit-core_$latest_core_commit"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ steps.release.outputs.VERSION }}
          tag: daed_${{ steps.release.outputs.VERSION }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "daed-${{ matrix.arch }}"
          body: |
            Standalone Binary for daed (with Core PR#936)
            - Architecture: ${{ matrix.arch }}
            - Release: ${{ steps.release.outputs.VERSION }}
