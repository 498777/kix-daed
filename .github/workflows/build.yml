name: Build daed Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'daed/Makefile'

jobs:
  check_and_update:
    # ... (此处保持之前的 check_and_update 逻辑不变) ...

  build:
    name: Build ${{ matrix.arch }}
    needs: check_and_update
    if: needs.check_and_update.outputs.update_needed == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk: openwrt-24.10
          - arch: aarch64_generic
            sdk: openwrt-24.10

    steps:
      - uses: actions/checkout@v4

      - name: Building via SDK
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          # 关键修改：利用 SDK Action 的编译前挂载机制
          # 我们把当前目录下的 daed 文件夹直接放入 SDK 运行时的 package/ 目录
          CUSTOM_PACKAGES: |
            daed
          PACKAGES: daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract Binary
        run: |
          # 此时 IPK 应该在 bin/packages/${{ matrix.arch }}/base/ 或 .../packages_ci/
          IPK_FILE=$(find bin/ -name "daed_*.ipk" | head -n 1)
          if [ -z "$IPK_FILE" ]; then 
            echo "Error: IPK not found!"
            find bin/ -name "*.ipk"
            exit 1 
          fi
          echo "Found IPK: $IPK_FILE"
          mkdir -p ./extract
          tar -xOf "$IPK_FILE" data.tar.gz | tar -xzC ./extract ./usr/bin/daed
          mv ./extract/usr/bin/daed ./daed-${{ matrix.arch }}

      - name: Create Release Info
        id: release
        run: |
          latest_commit=$(grep "DAED_VERSION:=daed-" daed/Makefile | sed 's/.*daed-//' | head -n 1)
          latest_wing_commit=$(grep "WING_VERSION:=wing-" daed/Makefile | sed 's/.*wing-//' | head -n 1)
          latest_core_commit=$(grep "CORE_VERSION:=core-" daed/Makefile | sed 's/.*core-//' | head -n 1)
          VERSION="$latest_commit-wing_$latest_wing_commit-core_$latest_core_commit"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ steps.release.outputs.VERSION }}
          tag: daed_${{ steps.release.outputs.VERSION }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "daed-${{ matrix.arch }}"
          body: |
            Standalone Binary for daed (with Core PR#936)
            - Architecture: ${{ matrix.arch }}
            - Release: ${{ steps.release.outputs.VERSION }}
