name: Build daed Binary (Direct)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64

    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Versions & Update Makefile
        id: vars
        run: |
          # 1. 获取上游最新信息
          UPSTREAM_DAED=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          UPSTREAM_WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)
          
          # 2. 格式化日期版本
          date_iso=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.commit.committer.date')
          pkg_version=$(date -d "$date_iso" +%Y.%m.%d)
          
          # 3. 写入环境变量供后续使用
          FULL_VER="daed-${UPSTREAM_DAED:0:7}-wing_${UPSTREAM_WING}-core_${UPSTREAM_CORE}"
          echo "FULL_VER=$FULL_VER" >> "$GITHUB_ENV"
          echo "TAG_VER=$pkg_version-$UPSTREAM_DAED" >> "$GITHUB_ENV"

          # 4. 修改本地 Makefile (仅执行一次)
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            sed -i "/PKG_VERSION:=/c\PKG_VERSION:=$pkg_version" ./daed/Makefile
            sed -i "/DAED_VERSION:=/c\DAED_VERSION:=daed-${UPSTREAM_DAED:0:7}" ./daed/Makefile
            sed -i "/WING_VERSION:=/c\WING_VERSION:=wing-$UPSTREAM_WING" ./daed/Makefile
            sed -i "/CORE_VERSION:=/c\CORE_VERSION:=core-$UPSTREAM_CORE" ./daed/Makefile
            sed -i "/PKG_SOURCE_VERSION:=/c\PKG_SOURCE_VERSION:=$UPSTREAM_DAED" ./daed/Makefile
            echo "CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Clone Upstream & Build Web
        run: |
          git clone --recursive https://github.com/daeuniverse/daed.git source
          cd source
          npm install -g pnpm
          # 针对 dae-lsp 报错的对策：忽略部分构建错误继续进行
          pnpm install
          pnpm build || echo "Build web had some warnings/errors, but checking dist..."
          # 检查关键产物是否存在
          if [ ! -d "apps/web/dist" ]; then echo "Web dist not found!"; exit 1; fi

      - name: Setup Go & Build Backend
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Install LLVM/Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15 llvm-15 libbpf-dev
          sudo ln -s /usr/bin/clang-15 /usr/bin/clang

      - name: Compile daed Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd source/wing
          # 强制指定构建输出
          make APPNAME=daed WEB_DIST=../apps/web/dist bundle
          mv daed ../../daed-${{ matrix.arch }}

      - name: Push Makefile Updates
        if: env.CHANGED == 'true' && matrix.arch == 'x86_64'
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add daed/Makefile
          git commit -m "Update daed to ${{ env.FULL_VER }}" || exit 0
          
      - name: Push to Main
        if: env.CHANGED == 'true' && matrix.arch == 'x86_64'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          branch: main

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.FULL_VER }}
          tag: release_${{ env.TAG_VER }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "daed-${{ matrix.arch }}"
          body: |
            ## daed Standalone Binary
            - **Architecture**: ${{ matrix.arch }}
            - **Backend Commit**: ${{ env.FULL_VER }}
            - **Build Date**: $(date)
