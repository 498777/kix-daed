name: Build daed Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'daed/Makefile'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk: openwrt-24.10
          - arch: aarch64_generic
            sdk: openwrt-24.10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Makefile
        id: update
        run: |
          sudo apt-get install -y dos2unix
          find . -type f -exec dos2unix {} \;
          
          # 获取各组件最新版本
          UPSTREAM_DAED=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          UPSTREAM_WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)
          
          # 计算日期版本
          date_daed_iso=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.commit.committer.date')
          pkg_version=$(date -d "$date_daed_iso" +%Y.%m.%d)
          
          # 修改 Makefile
          sed -i "/PKG_VERSION:=/c\PKG_VERSION:=$pkg_version" ./daed/Makefile
          sed -i "/DAED_VERSION:=/c\DAED_VERSION:=daed-${UPSTREAM_DAED:0:7}" ./daed/Makefile
          sed -i "/WING_VERSION:=/c\WING_VERSION:=wing-$UPSTREAM_WING" ./daed/Makefile
          sed -i "/CORE_VERSION:=/c\CORE_VERSION:=core-$UPSTREAM_CORE" ./daed/Makefile
          sed -i "/PKG_SOURCE_VERSION:=/c\PKG_SOURCE_VERSION:=$UPSTREAM_DAED" ./daed/Makefile
          
          # 准备版本号用于 Release
          VERSION="${UPSTREAM_DAED:0:7}-wing_$UPSTREAM_WING-core_$UPSTREAM_CORE"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Push Makefile Updates
        if: matrix.arch == 'x86_64'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add daed/Makefile
          git commit -m "Update daed to ${{ env.VERSION }}" || exit 0
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Building via SDK
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          PACKAGES: daed
          # 将本地 daed 文件夹链接到 SDK 的编译目录
          CUSTOM_PACKAGES: daed
          NO_REFRESH_CHECK: true

      - name: Extract Binary
        run: |
          # 寻找生成的 ipk
          IPK_FILE=$(find bin/ -name "daed_*.ipk" | head -n 1)
          if [ -z "$IPK_FILE" ]; then 
            echo "Error: IPK not found!"
            find bin/ -name "*.ipk"
            exit 1 
          fi
          mkdir -p ./extract
          tar -xOf "$IPK_FILE" data.tar.gz | tar -xzC ./extract ./usr/bin/daed
          mv ./extract/usr/bin/daed ./daed-${{ matrix.arch }}

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.VERSION }}
          tag: daed_${{ env.VERSION }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "daed-${{ matrix.arch }}"
          body: |
            Standalone Binary for daed (Core PR#936)
            - Architecture: ${{ matrix.arch }}
            - Version: ${{ env.VERSION }}
