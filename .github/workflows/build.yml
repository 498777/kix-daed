name: Build daed Binary (Direct)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check & Update Version
        id: vars
        run: |
          # 提取上游最新版本号
          UPSTREAM_DAED=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          UPSTREAM_WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)
          
          # 格式化日期版本
          date_iso=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.commit.committer.date')
          pkg_version=$(date -d "$date_iso" +%Y.%m.%d)
          
          # 构建 Release 标签名
          VERSION_TAG="${pkg_version}-wing_${UPSTREAM_WING}-core_${UPSTREAM_CORE}"
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          
          # 如果是手动触发或 Makefile 需要更新，则继续
          # 这里为了简化，直接克隆上游源码进行编译
          echo "BUILD_REQUIRED=true" >> "$GITHUB_ENV"

      - name: Clone Upstream Source
        run: |
          git clone --recursive https://github.com/daeuniverse/daed.git source
          cd source
          # 切换到主项目指定的 commit (可选)
          # git checkout ${{ steps.vars.outputs.UPSTREAM_DAED }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend (Web)
        run: |
          cd source
          npm install -g pnpm
          pnpm install
          pnpm build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install LLVM/Clang (for eBPF)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15 llvm-15 libbpf-dev
          sudo ln -s /usr/bin/clang-15 /usr/bin/clang

      - name: Build Backend (Wing)
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd source/wing
          # 使用 bundle 模式将 ../apps/web/dist 嵌入
          make APPNAME=daed WEB_DIST=../apps/web/dist bundle
          mv daed ../../daed-${{ matrix.arch }}

      - name: Push Makefile Update (Optional)
        # 如果你想保持你仓库里的 Makefile 也是最新的，可以在这里执行 push 逻辑
        if: matrix.arch == 'x86_64' 
        run: |
          # 此处逻辑同你之前的 Git 推送逻辑，使用 ACTIONS_DEPLOY_KEY
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          # 更新本地 Makefile 略...
          # git push ... 

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.VERSION_TAG }}
          tag: daed_${{ env.VERSION_TAG }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "daed-${{ matrix.arch }}"
          body: |
            Direct Compiled Binary (Non-SDK)
            Architecture: ${{ matrix.arch }}
            Version: ${{ env.VERSION_TAG }}
