name: 2 - Auto Build daed Binary

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['kix-daed/Makefile']
  workflow_run:
    workflows: ["1 - Sync Upstream & Deep Cleanup"]
    types: [completed]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.full_tag }}
      daed_full: ${{ steps.vars.outputs.daed_full }}
      daed: ${{ steps.vars.outputs.daed }}
      wing: ${{ steps.vars.outputs.wing }}
      core: ${{ steps.vars.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          D=$(grep "^D_SHA" kix-daed/Makefile | cut -d= -f2 | tr -d ' "?')
          W=$(grep "^W_SHA" kix-daed/Makefile | cut -d= -f2 | tr -d ' "?')
          C=$(grep "^C_SHA" kix-daed/Makefile | cut -d= -f2 | tr -d ' "?')
          echo "daed_full=$D" >> $GITHUB_OUTPUT
          echo "daed=${D:0:7}" >> $GITHUB_OUTPUT
          echo "wing=${W:0:7}" >> $GITHUB_OUTPUT
          echo "core=${C:0:7}" >> $GITHUB_OUTPUT
          echo "full_tag=daed_$(date +'%Y.%m.%d')-r${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-web:
    needs: check-versions
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          ref: ${{ needs.check-versions.outputs.daed_full }}
      - uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'
      - uses: pnpm/action-setup@v4
        with: { version: 10.24.0 }
      - run: |
          echo "@daeuniverse:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          pnpm install --no-frozen-lockfile
          pnpm build --filter daed
          mkdir -p dist && cp -r apps/web/dist/* ./dist/
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: dist/, retention-days: 1 }

  build-backend:
    needs: [check-versions, build-web]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goamd64: v3
            asset_name: amd64-v3
          - goarch: arm64
            goamd64: v1
            asset_name: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          ref: ${{ needs.check-versions.outputs.daed_full }}
          submodules: recursive
      - uses: actions/checkout@v4
        with: { path: my-config }
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: dist }
      - name: Execute Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          VERSION: ${{ needs.check-versions.outputs.tag_name }}
          BINARY_NAME: bin/daed-${{ matrix.asset_name }}
        run: |
          cp my-config/kix-daed/Makefile ./Makefile
          sudo apt-get update && sudo apt-get install -y clang-15 llvm-15 libelf-dev libcap-dev
          make build-backend
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-versions.outputs.tag_name }}
          files: bin/daed-${{ matrix.asset_name }}
          body: |
            ### 🛠️ Build Components
            - **daed**: `${{ needs.check-versions.outputs.daed }}`
            - **wing**: `${{ needs.check-versions.outputs.wing }}`
            - **core**: `olicesx/dae@${{ needs.check-versions.outputs.core }}`
            
            > ℹ️ **Default assets path**: `/usr/share/daed/`, **DB path**: `/etc/daed/wing.db`
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
