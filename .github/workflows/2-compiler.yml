name: Auto Build daed Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'daed/Makefile'  # 仅当 Makefile 版本更新或手动修改时触发，节省资源
      - 'my-config/**'   # 你的自定义配置修改时也触发

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.shas.outputs.full_tag }}
      daed_sha: ${{ steps.shas.outputs.daed }}
      wing_sha: ${{ steps.shas.outputs.wing }}
      core_sha: ${{ steps.shas.outputs.core }}
    steps:
      - name: Fetch Latest SHAs
        id: shas
        run: |
          DAED=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r .sha)
          WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r .sha)
          CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r .sha)
          echo "daed=${DAED:0:7}" >> $GITHUB_OUTPUT
          echo "wing=${WING:0:7}" >> $GITHUB_OUTPUT
          echo "core=${CORE:0:7}" >> $GITHUB_OUTPUT
          echo "full_tag=daed_$(date +'%Y.%m.%d')-r$(date +%H%M)" >> $GITHUB_OUTPUT

  build-web:
    needs: check-versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout daed
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed

      - name: Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Build Web Assets
        run: |
          # 注入私有仓库认证
          echo "@daeuniverse:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          pnpm install --no-frozen-lockfile
          TURBO_TELEMETRY_DISABLED=1 pnpm build
          
          # 路径适配：确保 dist_ready 包含所有构建产物
          mkdir -p dist_ready
          if [ -d "apps/web/dist" ]; then 
            cp -r apps/web/dist/* ./dist_ready/
          else 
            cp -r dist/* ./dist_ready/
          fi

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist_ready/
          retention-days: 1

  build-backend:
    needs: [check-versions, build-web]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout Official daed
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          fetch-depth: 0

      - name: Checkout My Custom Config
        uses: actions/checkout@v4
        with:
          path: my-config

      - name: Download Web Dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist # 这里的路径会对应 Makefile 中的 cp -r dist/.

      - name: Inject Custom Makefile
        run: cp my-config/kix-daed/Makefile ./Makefile

      - name: Deep Cleanup Runner Memory
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          docker rmi $(docker images -q) || true

      - name: Install Build Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15 llvm-15 libelf-dev libcap-dev build-essential git pkg-config

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Execute Makefile Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          D_SHA: ${{ needs.check-versions.outputs.daed_sha }}
          W_SHA: ${{ needs.check-versions.outputs.wing_sha }}
          C_SHA: ${{ needs.check-versions.outputs.core_sha }}
          GOEXPERIMENT: "newinliner,simd"
          CLANG: clang-15
          STRIP: llvm-strip-15
        run: make build-backend

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-versions.outputs.tag_name }}
          files: bin/daed-*
          body: |
            ### 🚀 Optimized Build for ARM64/AMD64

            ### 🛠️ Build Components
            - **daed**: `${{ needs.check-versions.outputs.daed_sha }}`
            - **wing**: `${{ needs.check-versions.outputs.wing_sha }}`
            - **core**: `olicesx/dae@${{ needs.check-versions.outputs.core_sha }}`

            > ℹ️ **Assets**: Embedded (Size: ~42MB)
            > ℹ️ **Default assets path**: `/usr/share/daed/`, **DB path**: `/etc/daed/wing.db`
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
