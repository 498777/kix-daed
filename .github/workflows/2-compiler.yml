name: 2 - Auto Build daed Binary

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['kix-daed/Makefile']
  workflow_run:
    workflows: ["1 - Sync Upstream & Deep Cleanup"]
    types: [completed]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.full_tag }}
      daed_full: ${{ steps.vars.outputs.daed_full }}
      daed: ${{ steps.vars.outputs.daed }}
      wing: ${{ steps.vars.outputs.wing }}
      core: ${{ steps.vars.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          D=$(grep "^D_SHA" kix-daed/Makefile | cut -d= -f2 | tr -d ' "?')
          W=$(grep "^W_SHA" kix-daed/Makefile | cut -d= -f2 | tr -d ' "?')
          C=$(grep "^C_SHA" kix-daed/Makefile | cut -d= -f2 | tr -d ' "?')
          echo "daed_full=$D" >> $GITHUB_OUTPUT
          echo "daed=${D:0:7}" >> $GITHUB_OUTPUT
          echo "wing=${W:0:7}" >> $GITHUB_OUTPUT
          echo "core=${C:0:7}" >> $GITHUB_OUTPUT
          echo "full_tag=daed_$(date +'%Y.%m.%d')-r${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-web:
    needs: check-versions
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          fetch-depth: 0 
      - name: Switch to SHA
        run: git checkout ${{ needs.check-versions.outputs.daed_full }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'

      - name: Build Web
        run: |
          # 1. 认证
          echo "@daeuniverse:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          
          # 2. 精准补齐 LSP 缺失的底层依赖
          cd packages/dae-lsp
          pnpm add vscode-languageserver vscode-languageserver-textdocument vscode-jsonrpc vscode-languageserver-types vscode-languageserver-protocol -D
          cd ../..
          pnpm install --no-frozen-lockfile
          
          # 3. 【核心修复】精准插入 inlineOnly 配置
          # 因为是 macOS 环境，sed -i 必须带个备份后缀 ''
          # 我们在 export default defineConfig 后面直接插入全局配置
          sed -i '' "s/export default defineConfig(\[/export default defineConfig({ inlineOnly: false, configs: \[/g" packages/dae-lsp/tsdown.config.ts
          # 在文件末尾补上闭合大括号
          sed -i '' "s/\])/\]})/g" packages/dae-lsp/tsdown.config.ts

          # 4. 执行构建 (使用 --filter=daed... 确保顺序)
          pnpm turbo run build --filter=daed...
          
          # 5. 校验并提取
          if [ -d "apps/web/dist" ]; then
            mkdir -p dist && cp -r apps/web/dist/* ./dist/
          else
            echo "Build failed, dist folder not found!" && exit 1
          fi
          
  build-backend:
    needs: [check-versions, build-web]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goamd64: v3
            asset_name: amd64-v3
          - goarch: arm64
            goamd64: v1
            asset_name: arm64
    steps:
      - name: Checkout Official daed
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          submodules: recursive
          fetch-depth: 0
      - name: Switch to SHA
        run: git checkout ${{ needs.check-versions.outputs.daed_full }}

      - name: Checkout My Custom Config
        uses: actions/checkout@v4
        with: { path: my-config }

      - name: Download Web Dist
        uses: actions/download-artifact@v4
        with: { name: web-dist, path: dist }

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      
      - name: Execute Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          VERSION: ${{ needs.check-versions.outputs.tag_name }}
          BINARY_NAME: bin/daed-${{ matrix.asset_name }}
        run: |
          cp my-config/kix-daed/Makefile ./Makefile
          sudo apt-get update && sudo apt-get install -y clang-15 llvm-15 libelf-dev libcap-dev
          make build-backend

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-versions.outputs.tag_name }}
          files: bin/daed-${{ matrix.asset_name }}
          body: |
            ### 🛠️ Build Components
            - **daed**: `${{ needs.check-versions.outputs.daed }}`
            - **wing**: `${{ needs.check-versions.outputs.wing }}`
            - **core**: `olicesx/dae@${{ needs.check-versions.outputs.core }}`
            
            > ℹ️ **Default assets path**: `/usr/share/daed/`, **DB path**: `/etc/daed/wing.db`
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
