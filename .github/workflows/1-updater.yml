name: 1 - Sync Upstream & Deep Cleanup

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Check Upstream Updates
        id: check
        run: |
          # 获取各组件最新 SHA
          DAED_JSON=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main)
          WING_JSON=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main)
          CORE_JSON=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes)

          UPSTREAM_DAED_FULL=$(echo "$DAED_JSON" | jq -r '.sha')
          UPSTREAM_DAED_SHORT=${UPSTREAM_DAED_FULL:0:7}
          UPSTREAM_WING_SHORT=$(echo "$WING_JSON" | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_CORE_SHORT=$(echo "$CORE_JSON" | jq -r '.sha' | cut -b 1-7)

          # --- 路径修正：检查 kix-daed/Makefile ---
          # 使用 find 忽略大小写查找，防止 makefile/Makefile 混淆
          TARGET_MK=$(find kix-daed -iname "makefile" | head -n 1)
          CURRENT_DAED=$(grep "PKG_SOURCE_VERSION:=" "$TARGET_MK" | cut -d= -f2 || true)

          echo "Target Makefile: $TARGET_MK"
          echo "Upstream: $UPSTREAM_DAED_FULL | Local: $CURRENT_DAED"

          if [ "$UPSTREAM_DAED_FULL" != "$CURRENT_DAED" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "daed_full=$UPSTREAM_DAED_FULL" >> $GITHUB_OUTPUT
            echo "daed_short=$UPSTREAM_DAED_SHORT" >> $GITHUB_OUTPUT
            echo "wing_short=$UPSTREAM_WING_SHORT" >> $GITHUB_OUTPUT
            echo "core_short=$UPSTREAM_CORE_SHORT" >> $GITHUB_OUTPUT
            echo "target_mk=$TARGET_MK" >> $GITHUB_OUTPUT
            
            LATEST_DATE=$(echo -e "$(echo "$DAED_JSON" | jq -r '.commit.committer.date')\n$(echo "$WING_JSON" | jq -r '.commit.committer.date')\n$(echo "$CORE_JSON" | jq -r '.commit.committer.date')" | sort -r | head -n 1)
            echo "pkg_ver=$(date -d "$LATEST_DATE" +%Y.%m.%d)" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Makefile & Push
        if: steps.check.outputs.update_needed == 'true'
        run: |
          MK="${{ steps.check.outputs.target_mk }}"
          
          # 针对你的 Makefile 特有变量进行替换
          sed -i "s/^\(D_SHA[[:space:]]*[?:]=[[:space:]]*\).*/\1${{ steps.check.outputs.daed_short }}/" "$MK"
          sed -i "s/^\(W_SHA[[:space:]]*[?:]=[[:space:]]*\).*/\1${{ steps.check.outputs.wing_short }}/" "$MK"
          sed -i "s/^\(C_SHA[[:space:]]*[?:]=[[:space:]]*\).*/\1${{ steps.check.outputs.core_short }}/" "$MK"

          # 打印调试，确认变量已更新
          echo "---- Makefile Check ----"
          grep -E "_SHA" "$MK"

          # 检查变动并提交
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected, skipping commit."
            exit 0
          fi

          git config --global user.email "bot@github.com"
          git config --global user.name "VersionBot"
          git add .
          git commit -m "chore: update component SHAs to ${{ steps.check.outputs.daed_short }}"
          git push origin main

      - name: Delete Older Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        continue-on-error: true

      - name: Cleanup Workflow Logs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
        continue-on-error: true
