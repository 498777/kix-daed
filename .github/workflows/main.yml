name: Build daed (PR-936) Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            arch: x86_64
          - goarch: arm64
            arch: aarch64_generic

    steps:
      - name: Checkout daed
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          fetch-depth: 0
          submodules: recursive

      - name: Get Version
        id: meta
        run: |
          latest_commit=$(git rev-parse --short=7 HEAD)
          latest_wing_commit=$(git -C wing rev-parse --short=7 HEAD 2>/dev/null || echo "unknown")
          CORE_JSON=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes)
          latest_core_commit=$(echo $CORE_JSON | jq -r '.sha' | cut -b 1-7)
          VERSION_STR="$latest_commit-wing_$latest_wing_commit-core_$latest_core_commit"
          echo "version=$VERSION_STR" >> "$GITHUB_ENV"
          echo "CORE_SHA_FULL=$(echo $CORE_JSON | jq -r '.sha')" >> "$GITHUB_ENV"

      - name: Setup Node & Go
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Build Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libpcap-dev jq
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          npm install -g pnpm

      - name: Replace Core and Dependencies
        run: |
          cd wing
          go get github.com/olicesx/dae@${{ env.CORE_SHA_FULL }}
          CORE_PSEUDO_VERSION=$(go list -m github.com/olicesx/dae | awk '{print $2}')
          go mod edit -replace github.com/daeuniverse/dae=github.com/olicesx/dae@$CORE_PSEUDO_VERSION

          OLICESX_OUTBOUND_SHA=$(curl -s https://api.github.com/repos/olicesx/outbound/commits/optimize/code-quality-fixes | jq -r '.sha')
          if [ "$OLICESX_OUTBOUND_SHA" == "null" ] || [ -z "$OLICESX_OUTBOUND_SHA" ]; then
            go get github.com/daeuniverse/outbound@main
            OB_VER=$(go list -m github.com/daeuniverse/outbound | awk '{print $2}')
            go mod edit -replace github.com/daeuniverse/outbound=github.com/daeuniverse/outbound@$OB_VER
          else
            go get github.com/olicesx/outbound@$OLICESX_OUTBOUND_SHA
            OB_VER=$(go list -m github.com/olicesx/outbound | awk '{print $2}')
            go mod edit -replace github.com/daeuniverse/outbound=github.com/olicesx/outbound@$OB_VER
          fi

          go mod tidy
          cd ..

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          make VERSION=${{ env.version }} OUTPUT=daed-${{ matrix.arch }}

      - name: Upload packages
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.version }}
          allowUpdates: true
          tag: daed_${{ env.version }}
          commit: main
          token: ${{secrets.ACTIONS_DEPLOY_KEY}}
          replacesArtifacts: true
          artifacts: "daed-${{ matrix.arch }}"
