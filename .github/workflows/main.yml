name: Direct Build daed Bundle

on:
  workflow_dispatch:
  push:
    paths:
      - 'daed/Makefile'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            arch_name: x86_64
          - goarch: arm64
            arch_name: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev gcc-multilib musl-tools
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Setup Node & Go
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Clone Sources
        run: |
          WING_SHA=$(grep "WING_VERSION:=" daed/Makefile | sed 's/.*wing-//')
          CORE_SHA=$(grep "CORE_VERSION:=" daed/Makefile | sed 's/.*core-//')
          DAED_SHA=$(grep "PKG_SOURCE_VERSION:=" daed/Makefile | cut -d= -f2)
          
          git clone https://github.com/daeuniverse/daed.git ./daed-src && cd ./daed-src && git checkout $DAED_SHA && cd ..
          git clone https://github.com/daeuniverse/dae-wing.git ./wing-src && cd ./wing-src && git checkout $WING_SHA && cd ..
          git clone https://github.com/olicesx/dae.git ./core-src && cd ./core-src && git checkout $CORE_SHA && cd ..

      - name: Build Frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          TSDOWN_INLINE_ONLY: "false"
        run: |
          cd ./daed-src
          npm install -g pnpm
          pnpm install
          pnpm build
          mkdir -p ../dist
          if [ -d "apps/web/dist" ]; then
            cp -r apps/web/dist/* ../dist/
          else
            cp -r dist/* ../dist/
          fi

      - name: Build eBPF
        run: |
          cd ./core-src
          make ebpf

      - name: Build Final Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then export CC=aarch64-linux-gnu-gcc; fi
          
          cd ./wing-src
          mkdir -p webrender/web
          cp -r ../dist/* webrender/web/
          find webrender/web -type f -size +4k ! -name "*.gz" -exec gzip -9 -k {} \;
          
          ln -s ../core-src dae-core
          go generate ./...
          
          go build -tags=embedallowed -trimpath \
            -ldflags="-s -w -X github.com/daeuniverse/dae-wing/db.AppVersion=$(date +%Y%m%d)" \
            -o ../daed-${{ matrix.arch_name }} .

      - name: Release Binary
        uses: ncipollo/release-action@v1
        with:
          name: daed_bundle_${{ github.run_id }}
          tag: daed_${{ github.run_id }}
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "./daed-*"
          replacesArtifacts: true
