name: Build daed Core

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk: openwrt-24.10
            arch_name: arm64
          - arch: x86_64
            sdk: openwrt-24.10
            arch_name: amd64

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo swapoff -a
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install clang llvm npm jq
          sudo npm install -g pnpm n
          sudo n 20
          latest_commit=$(grep "DAED_VERSION:=daed-" daed/Makefile | sed 's/.*daed-//' | head -n 1)
          latest_wing_commit=$(grep "WING_VERSION:=wing-" daed/Makefile | sed 's/.*wing-//' | head -n 1)
          latest_core_commit=$(grep "CORE_VERSION:=core-" daed/Makefile | sed 's/.*core-//' | head -n 1)
          echo "version=$latest_commit-wing_$latest_wing_commit-core_$latest_core_commit" >> "$GITHUB_ENV"

      - name: Building daed core
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: daed
          NO_REFRESH_CHECK: true
          TSDOWN_INLINE_ONLY: "false"
          V: s

      - name: Extract Binary
        run: |
          BIN_PATH=$(find build_dir/ -type f -name "daed" -executable | grep -v "/ipkg-" | head -n 1)
          if [ -z "$BIN_PATH" ]; then
            exit 1
          fi
          cp "$BIN_PATH" "./daed-${{ matrix.arch_name }}"
          chmod +x "./daed-${{ matrix.arch_name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: daed-${{ matrix.arch_name }}
          path: ./daed-${{ matrix.arch_name }}

      - name: Release Core Binary
        uses: ncipollo/release-action@v1
        with:
          name: daed_core_${{ env.version }}
          tag: daed_${{ env.version }}
          allowUpdates: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          replacesArtifacts: true
          artifacts: "./daed-${{ matrix.arch_name }}"
