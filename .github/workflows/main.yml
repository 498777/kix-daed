name: Build daed (PR-936) Binary

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            arch: x86_64
          - goarch: arm64
            arch: aarch64_generic

    steps:
      - name: Checkout daed
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          fetch-depth: 0
          submodules: recursive

      - name: Get Version and Check Updates
        id: version
        run: |
          UPSTREAM_DAED_SHA=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          UPSTREAM_CORE_SHA=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_WING_SHA=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          
          TIMESTAMP=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.commit.author.date')
          FORMATTED_DATE=$(date --date="$TIMESTAMP" "+%Y-%m-%d")
          
          # 拼接原始版本命名规则
          VERSION_STR="$FORMATTED_DATE-daed_${UPSTREAM_DAED_SHA:0:7}-wing_$UPSTREAM_WING_SHA-core_$UPSTREAM_CORE_SHA"
          
          echo "version=$VERSION_STR" >> "$GITHUB_ENV"
          echo "CORE_SHA_FULL=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha')" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Replace Core with PR-936
        run: |
          go mod edit -replace github.com/daeuniverse/dae=github.com/olicesx/dae@${{ env.CORE_SHA_FULL }}
          go mod tidy

      - name: Build Dashboard
        run: |
          npm install -g pnpm
          cd dashboard
          pnpm install
          pnpm build
          cd ..

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libpcap-dev
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          mkdir -p release
          go build -v \
            -ldflags "-s -w -X github.com/daeuniverse/daed/constant.Version=${{ env.version }}" \
            -o release/daed-${{ matrix.arch }} \
            .

      - name: Upload packages
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.version }}
          allowUpdates: true
          tag: daed_${{ env.version }}
          commit: main
          token: ${{secrets.ACTIONS_DEPLOY_KEY}}
          replacesArtifacts: true
          artifacts: "release/daed-${{ matrix.arch }}"
