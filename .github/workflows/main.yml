name: Build daed Web & Core Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  check_and_sync:
    runs-on: ubuntu-22.04
    outputs:
      update_needed: ${{ steps.check.outputs.update_needed }}
      pkg_version: ${{ steps.update.outputs.pkg_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check Upstream Updates
        id: check
        run: |
          UPSTREAM_DAED=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          UPSTREAM_WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          UPSTREAM_CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)

          CURRENT_DAED=$(grep "PKG_SOURCE_VERSION:=" daed/Makefile | cut -d= -f2)
          CURRENT_WING=$(grep "WING_VERSION:=wing-" daed/Makefile | sed 's/.*wing-//' | head -n 1)
          CURRENT_CORE=$(grep "CORE_VERSION:=core-" daed/Makefile | sed 's/.*core-//' | head -n 1)

          if [ "$UPSTREAM_DAED" != "$CURRENT_DAED" ] || [ "$UPSTREAM_WING" != "$CURRENT_WING" ] || [ "$UPSTREAM_CORE" != "$CURRENT_CORE" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Makefile
        id: update
        if: steps.check.outputs.update_needed == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y jq dos2unix
          
          D_DATE=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.commit.committer.date')
          W_DATE=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.commit.committer.date')
          C_DATE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.commit.committer.date')
          LATEST_ISO=$(echo -e "$D_DATE\n$W_DATE\n$C_DATE" | sort -r | head -n 1)
          PKG_VER=$(date -d "$LATEST_ISO" +%Y.%m.%d)
          
          L_DAED_FULL=$(curl -s https://api.github.com/repos/daeuniverse/daed/commits/main | jq -r '.sha')
          L_DAED=$(echo $L_DAED_FULL | cut -b 1-7)
          L_WING=$(curl -s https://api.github.com/repos/daeuniverse/dae-wing/commits/main | jq -r '.sha' | cut -b 1-7)
          L_CORE=$(curl -s https://api.github.com/repos/olicesx/dae/commits/optimize/code-quality-fixes | jq -r '.sha' | cut -b 1-7)

          sed -i "/PKG_VERSION:=/c\PKG_VERSION:=$PKG_VER" ./daed/Makefile
          sed -i "/DAED_VERSION:=/c\DAED_VERSION:=daed-$L_DAED" ./daed/Makefile
          sed -i "/WING_VERSION:=/c\WING_VERSION:=wing-$L_WING" ./daed/Makefile
          sed -i "/CORE_VERSION:=/c\CORE_VERSION:=core-$L_CORE" ./daed/Makefile
          sed -i "/PKG_SOURCE_VERSION:=/c\PKG_SOURCE_VERSION:=$L_DAED_FULL" ./daed/Makefile
          
          find . -type f -name "*.init" -exec dos2unix {} \;
          find . -type f -name "98-daed" -exec dos2unix {} \;
          
          echo "pkg_version=$PKG_VER-$L_DAED" >> "$GITHUB_OUTPUT"

      - name: Push Changes
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Auto Sync: $(date +%Y-%m-%d)" || exit 0
          git push https://${{ secrets.ACTIONS_DEPLOY_KEY }}@github.com/${{ github.repository }}.git main

  build_core:
    needs: check_and_sync
    if: needs.check_and_sync.outputs.update_needed == 'true'
    strategy:
      matrix:
        include:
          - arch: aarch64_generic
            sdk: openwrt-24.10
            name: arm64
          - arch: x86_64
            sdk: openwrt-24.10
            name: amd64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build Core Binary
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: daed
          TSDOWN_INLINE_ONLY: "false"
          V: s

      - name: Extract Binary
        run: |
          BIN_PATH=$(find build_dir/ -type f -name "daed" -executable | grep -v "/ipkg-" | head -n 1)
          [ -z "$BIN_PATH" ] && exit 1
          cp "$BIN_PATH" "./daed-${{ matrix.name }}"

      - name: Release Core
        uses: ncipollo/release-action@v1
        with:
          tag: daed_${{ needs.check_and_sync.outputs.pkg_version }}
          name: "daed Core ${{ needs.check_and_sync.outputs.pkg_version }}"
          allowUpdates: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "./daed-${{ matrix.name }}"
          replacesArtifacts: true

  cleanup:
    needs: build_core
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Workflow Runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          retain_days: 1
          keep_minimum_runs: 1
