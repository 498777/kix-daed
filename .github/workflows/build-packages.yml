name: Build packages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goos: linux
            cc: gcc
          - goarch: arm64
            goos: linux
            cc: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout daed
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Build Tools
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libpcap-dev:arm64 gcc-aarch64-linux-gnu
          npm install -g pnpm

      - name: Prepare Custom dae-core
        run: |
          rm -rf dae
          git clone https://github.com/olicesx/dae.git dae
          cd dae
          git checkout optimize/code-quality-fixes
          cd ..

      - name: Build Web Frontend
        run: |
          cd web
          pnpm install
          pnpm build
          cd ..

      - name: Build dae-core & dae-wing
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v -ldflags "-s -w" -o ./dae-bin ./dae
          if [ -d "wing" ]; then
            go build -v -ldflags "-s -w" -o ./dae-wing-bin ./wing
          fi

      - name: Build Final daed Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          VERSION=$(grep "DAED_VERSION:=" Makefile 2>/dev/null | sed 's/.*daed-//' || echo "custom")
          go build -v -ldflags "-s -w -X main.Version=$VERSION" -o daed-${{ matrix.goarch }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-custom-${{ matrix.goarch }}
          path: daed-${{ matrix.goarch }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: daed_custom_core
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "daed-${{ matrix.goarch }}"
