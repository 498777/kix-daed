name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - VERSION

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load VERSION
        run: |
          version=$(grep PKG_VERSION VERSION | cut -d '=' -f2 | tr -d ':')
          wing_sha=$(grep WING_VERSION VERSION | sed 's/.*wing-//')
          core_sha=$(grep CORE_VERSION VERSION | sed 's/.*core-//')
          echo "version=$version" >> $GITHUB_ENV
          echo "WING_SHA=$wing_sha" >> $GITHUB_ENV
          echo "CORE_SHA=$core_sha" >> $GITHUB_ENV

      - name: Clone dae-wing at commit SHA (no sparse-checkout)
        run: |
          set -e
          rm -rf wing-src
          mkdir -p wing-src
          git -C wing-src init
          git -C wing-src remote add origin https://github.com/daeuniverse/dae-wing.git
          git -C wing-src fetch --no-tags --no-recurse-submodules origin
          git -C wing-src checkout --force ${{ env.WING_SHA }}
          git -C wing-src submodule update --init --recursive || true

      - name: Replace core with your olicesx version (SHA)
        run: |
          cd wing-src
          go mod edit -replace github.com/daeuniverse/dae=github.com/olicesx/dae@${CORE_SHA}
          go mod tidy

      - name: Query GitHub API for latest daeuniverse/outbound commit and pin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Try main branch commit first
          OUTBOUND_SHA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/daeuniverse/outbound/commits/main" \
            | jq -r '.sha // empty')
          if [ -z "$OUTBOUND_SHA" ]; then
            # Fallback: try latest tag commit
            TAG=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/daeuniverse/outbound/tags" \
              | jq -r '.[0].name // empty')
            if [ -n "$TAG" ]; then
              OUTBOUND_SHA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/daeuniverse/outbound/commits/${TAG}" \
                | jq -r '.sha // empty')
            fi
          fi
          if [ -z "$OUTBOUND_SHA" ]; then
            echo "Failed to determine outbound commit via GitHub API; aborting."
            exit 1
          fi
          echo "OUTBOUND_SHA=$OUTBOUND_SHA" >> $GITHUB_ENV
          echo "Pinned outbound commit: $OUTBOUND_SHA"

      - name: Pin outbound in go.mod to API-resolved commit
        run: |
          cd wing-src
          # Use the commit SHA returned by the API to pin outbound
          go get github.com/daeuniverse/outbound@${OUTBOUND_SHA}
          go mod tidy

      - name: Build daed
        run: |
          cd wing-src
          mkdir -p ../bin
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -v -trimpath -ldflags "-s -w" \
            -o ../bin/daed-${{ matrix.arch }} \
            ./cmd/dae-wing

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch }}
          path: bin/daed-${{ matrix.arch }}

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: daed-${{ env.version }}-${{ env.CORE_SHA }}
          name: daed-${{ env.version }}-${{ env.CORE_SHA }}
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
