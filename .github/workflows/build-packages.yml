name: Build Packages

on:
  push:
    branches:
      - main
    paths:
      - VERSION

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout dae-wing
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/dae-wing
          ref: main
          path: wing-src

      - name: Replace core with your olicesx version
        run: |
          cd wing-src
          go mod edit -replace github.com/daeuniverse/dae=github.com/olicesx/dae@optimize/code-quality-fixes
          go mod tidy

      - name: Build daed
        run: |
          cd wing-src
          mkdir -p ../bin
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -v -trimpath -ldflags "-s -w" \
            -o ../bin/daed-${{ matrix.arch }} \
            ./cmd/dae-wing

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch }}
          path: bin/daed-${{ matrix.arch }}
