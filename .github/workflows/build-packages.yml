name: Build packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic    
          - x86_64
        sdk:
          - openwrt-24.10

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Get node-empty
        run: |
          git clone https://github.com/sbwml/node-empty

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo swapoff -a
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install clang llvm npm jq
          sudo npm install -g pnpm n taze
          sudo n stable
          latest_commit=$(grep "DAED_VERSION:=daed-" daed/Makefile | sed 's/.*daed-//' | head -n 1)
          echo "version=$latest_commit" >> "$GITHUB_ENV"

      - name: Building packages
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: daed-${{ matrix.arch }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/daed*.ipk

      - name: Upload packages
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.version }}
          allowUpdates: true
          tag: daed_${{ env.version }}
          commit: main
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          replacesArtifacts: true
          artifacts: "bin/packages/${{ matrix.arch }}/packages_ci/daed*.ipk"
