name: Direct Build daed Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build daed for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            arch_label: aarch64_generic
            cc: aarch64-linux-gnu-gcc
          - goarch: amd64
            arch_label: x86_64
            cc: x86_64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu curl wget
          npm install -g pnpm

      - name: Prepare Source
        run: |
          DAED_HASH=$(grep "PKG_SOURCE_VERSION:=" daed/Makefile | cut -d= -f2)
          WING_V=$(grep "WING_VERSION:=" daed/Makefile | cut -d- -f2)
          CORE_V=$(grep "CORE_VERSION:=" daed/Makefile | cut -d- -f2)
          
          git clone https://github.com/daeuniverse/daed.git source
          cd source && git checkout $DAED_HASH && cd ..
          
          git clone https://github.com/daeuniverse/dae-wing source/wing
          cd source/wing && git checkout $WING_V && cd ../..
          
          git clone https://github.com/olicesx/dae source/wing/dae-core
          cd source/wing/dae-core && git checkout $CORE_V && git submodule update --init && cd ../../../
          
          git clone --depth=1 -b fix/direct-memory-safety https://github.com/olicesx/outbound.git source/outbound
          
          echo "VERSION_TAG=daed-${DAED_HASH:0:7}_wing-${WING_V}_core-${CORE_V}" >> $GITHUB_ENV

      - name: Build Frontend
        run: |
          cd source
          pnpm install
          pnpm build --filter daed
          mkdir -p wing/webrender/web
          cp -rf apps/web/dist/* wing/webrender/web/

      - name: Build Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          cd source/wing
          go mod edit -replace github.com/daeuniverse/outbound=../outbound
          go mod tidy
          go generate ./...
          go build -v -trimpath \
            -ldflags "-s -w -X 'github.com/daeuniverse/dae-wing/db.AppName=daed' -X 'github.com/daeuniverse/dae-wing/db.AppVersion=${{ env.VERSION_TAG }}' -extldflags '-static'" \
            -tags "embedallowed,trace" \
            -o ../../daed-${{ matrix.arch_label }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch_label }}
          path: daed-${{ matrix.arch_label }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.VERSION_TAG }}
          tag: ${{ env.VERSION_TAG }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          artifacts: "daed-*"
