name: Build and Release daed

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goarch: amd64, arch_name: x86_64 }
          - { goarch: arm64, arch_name: aarch64 }
    
    steps:
      - name: Checkout Code
        uses: actions/checkout: v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Dependencies
        run: |
          npm install -g pnpm
          sudo apt-get update && sudo apt-get install -y build-essential libpcap-dev

      - name: Patch dae-core
        run: |
          cd wing
          git remote add upstream https://github.com/daeuniverse/dae.git || true
          git fetch upstream pull/936/head:patch-dns
          git checkout patch-dns
          cd ..

      - name: Build Web
        run: make dist

      - name: Build Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          make daed VERSION=${{ github.sha }} OUTPUT=daed-linux-${{ matrix.arch_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch_name }}
          path: daed-linux-${{ matrix.arch_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          tag_name: kix-daed_${{ github.sha }}
          name: Release kix-daed_${{ github.sha }}
          files: |
            daed-x86_64/daed-linux-x86_64
            daed-aarch64/daed-linux-aarch64

  cleanup:
    needs: release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_expired_data: 3 days
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
