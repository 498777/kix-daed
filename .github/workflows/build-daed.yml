name: Build daed (Kix Edition - Optimized)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.changed }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - name: Check for New Commits
        id: check
        run: |
          LATEST_SHA=$(curl -s https://api.github.com/repos/olicesx/dae/commits/main | jq -r '.sha')
          SHORT_SHA=${LATEST_SHA:0:7}
          LAST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name' || echo "none")
          
          if [[ "$LAST_TAG" != "kix-daed_$SHORT_SHA" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-update
    if: needs.check-update.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - name: System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev gcc-aarch64-linux-gnu pkg-config libssl-dev build-essential
          sudo npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Clone Components
        run: |
          git clone --recursive https://github.com/daeuniverse/daed.git .
          rm -rf wing/dae-core
          git clone https://github.com/olicesx/dae.git wing/dae-core

      - name: Build Frontend
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          pnpm install
          pnpm build --filter daed || echo "Frontend build exited with warnings, checking assets..."
          
          if [ -d "apps/web/dist" ] && [ "$(ls -A apps/web/dist)" ]; then
            mkdir -p wing/webrender/web
            cp -rf apps/web/dist/* wing/webrender/web/
          else
            exit 1
          fi

      - name: Compile Backend
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          cd wing
          go generate ./...
          go build -v -o ../daed-${{ matrix.arch }} \
            -trimpath \
            -ldflags "-s -w -X 'github.com/daeuniverse/dae-wing/db.AppVersion=kix-${{ needs.check-update.outputs.short_sha }}' -linkmode external -extldflags '-static'" \
            -tags "embedallowed,trace" \
            ./main.go

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: kix-daed_${{ needs.check-update.outputs.short_sha }}
          name: daed-kix-${{ needs.check-update.outputs.short_sha }}
          allowUpdates: true
          artifacts: "daed-${{ matrix.arch }}"
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Remove Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_older_than: 24h
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
