name: Build daed Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic    
          - x86_64
        sdk:
          - openwrt-24.10

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo swapoff -a
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install clang llvm npm jq
          sudo npm install -g pnpm n
          sudo n stable
          latest_commit=$(grep "DAED_VERSION:=daed-" daed/Makefile | sed 's/.*daed-//' | head -n 1)
          echo "version=$latest_commit" >> "$GITHUB_ENV"

      - name: Building daed only
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract and chmod binary
        run: |
          IPK_FILE=$(find bin/packages/${{ matrix.arch }}/packages_ci/ -name "daed_*.ipk" | grep -v "luci" | head -n 1)
          if [ -f "$IPK_FILE" ]; then
            tar -zxf "$IPK_FILE" -O data.tar.gz | tar -zxf - --strip-components=3 ./usr/bin/daed
            chmod +x daed
            mv daed daed-${{ matrix.arch }}
          else
            exit 1
          fi

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.version }}
          allowUpdates: true
          tag: daed_${{ env.version }}
          commit: main
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          replacesArtifacts: true
          artifacts: "daed-${{ matrix.arch }}"
