name: Build daed (Kix Edition - Dockerized Core Swap)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.changed }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - name: Check for New Commits
        id: check
        run: |
          LATEST_SHA=$(curl -s https://api.github.com/repos/olicesx/dae/commits/main | jq -r '.sha')
          SHORT_SHA=${LATEST_SHA:0:7}
          LAST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name' || echo "none")
          
          if [[ "$LAST_TAG" != "kix-daed_$SHORT_SHA" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-update
    if: needs.check-update.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout daed
        run: git clone --recursive https://github.com/daeuniverse/daed.git .

      - name: Swap Core Source
        run: |
          rm -rf wing/dae-core
          git clone https://github.com/olicesx/dae.git wing/dae-core

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Custom Dockerfile
        run: |
          cat <<EOF > Dockerfile.kix
          FROM node:20-alpine AS build-web
          WORKDIR /build
          COPY . .
          RUN corepack enable && corepack prepare pnpm@latest --activate
          RUN pnpm install
          RUN NODE_OPTIONS='--max_old_space_size=4096' pnpm --filter daed build

          FROM golang:1.23-bookworm AS build-bundle
          RUN apt-get update && apt-get install -y git make llvm clang libelf-dev build-essential
          WORKDIR /build
          COPY --from=build-web /build/apps/web/dist /build/web
          COPY . .
          WORKDIR /build/wing
          RUN go generate ./...
          RUN go build -v -o /build/daed-bin \
              -trimpath \
              -ldflags "-s -w -X 'github.com/daeuniverse/dae-wing/db.AppVersion=kix-${{ needs.check-update.outputs.short_sha }}' -extldflags '-static'" \
              -tags "embedallowed,trace" \
              ./main.go

          FROM scratch
          COPY --from=build-bundle /build/daed-bin /daed-bin
          EOF

      - name: Build with Docker
        run: |
          mkdir -p ./output
          docker buildx build --platform ${{ matrix.platform }} \
            -f Dockerfile.kix \
            -t daed-temp:${{ matrix.arch }} \
            --output type=local,dest=./output .

      - name: Prepare Artifact
        run: |
          mv ./output/daed-bin ./daed-${{ matrix.arch }}
          chmod +x ./daed-${{ matrix.arch }}

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: kix-daed_${{ needs.check-update.outputs.short_sha }}
          name: daed-kix-${{ needs.check-update.outputs.short_sha }}
          allowUpdates: true
          artifacts: "daed-${{ matrix.arch }}"
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Remove Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_older_than: 24h
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
