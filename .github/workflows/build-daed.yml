name: Build packages daed

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version metadata
        id: meta
        shell: bash
        run: |
          pkg_version=$(grep '^PKG_VERSION:=' daed/Makefile | head -n 1 | cut -d= -f2)
          pkg_release=$(grep '^PKG_RELEASE:=' daed/Makefile | head -n 1 | cut -d= -f2)
          version="${pkg_version}-r${pkg_release}"
          release_tag="daed_${version}"
          release_name="daed_${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk: openwrt-25.12
          - arch: x86_64
            sdk: openwrt-25.12

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get node-empty
        run: git clone https://github.com/sbwml/node-empty

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
        run: |
          sudo swapoff -a || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get update
          sudo -E apt-get install -y clang llvm npm curl jq
          sudo npm install -g pnpm n taze
          sudo n stable
          curl -L https://gitlab.alpinelinux.org/api/v4/projects/5/packages/generic/apk-tools/2.14.0/apk.static.x86_64 -o apk
          chmod +x apk
          sudo mv apk /usr/local/bin/apk

      - name: Build packages
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract binary from apk
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find bin/packages/${{ matrix.arch }}/packages_ci/ -name "daed_*.apk" | while read -r f; do
            mkdir -p ./temp_extract
            apk extract --allow-untrusted "$f" -X ./temp_extract
            if [ -f "./temp_extract/usr/bin/daed" ]; then
              cp "./temp_extract/usr/bin/daed" "dist/daed-${{ matrix.arch }}"
            fi
            rm -rf ./temp_extract
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-binary
          path: dist/daed-*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ github.sha }}
          artifacts: "release-assets/daed-*"
