name: Build and Release daed

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            arch_name: x86_64
            gcc_pkg: gcc-multilib
          - goarch: arm64
            arch_name: aarch64
            gcc_pkg: gcc-aarch64-linux-gnu
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Set Short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Deps
        run: |
          npm install -g pnpm
          sudo apt-get update
          sudo apt-get install -y build-essential libpcap-dev ${{ matrix.gcc_pkg }}

      - name: Patch dae-core
        run: |
          if [ -d "wing" ]; then
            TARGET_DIR="wing"
          elif [ -d "backend" ]; then
            TARGET_DIR="backend"
          else
            TARGET_DIR="."
          fi
          
          cd "$TARGET_DIR"
          if [ -f "go.mod" ]; then
            git remote add patch_repo https://github.com/olicesx/dae.git || true
            git fetch patch_repo optimize/code-quality-fixes
            git checkout patch_repo/optimize/code-quality-fixes
          fi
          cd ${{ github.workspace }}

      - name: Build Web
        run: make dist

      - name: Build Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          make daed VERSION=${{ steps.vars.outputs.short_sha }} OUTPUT=daed-${{ matrix.arch_name }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch_name }}
          path: daed-${{ matrix.arch_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          tag_name: kix-daed_${{ needs.build.outputs.short_sha }}
          name: Release kix-daed_${{ needs.build.outputs.short_sha }}
          files: |
            daed-x86_64/daed-x86_64
            daed-aarch64/daed-aarch64

  cleanup:
    needs: release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_expired_data: 3 days
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Cleanup All Workflow Runs
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          CUTOFF_DATE=$(date -d '3 days ago' +%Y-%m-%d)
          for workflow in $(gh workflow list --json id -q '.[].id'); do
            gh run delete --workflow "$workflow" --created "<$CUTOFF_DATE" --confirm || true
          done
