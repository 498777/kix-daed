name: Build Binary Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate version metadata
        id: meta
        shell: bash
        run: |
          daed_h=$(grep '^DAED_VERSION:=' daed/Makefile | cut -d- -f2)
          wing_h=$(grep '^WING_VERSION:=' daed/Makefile | cut -d- -f2)
          core_h=$(grep '^CORE_VERSION:=' daed/Makefile | cut -d- -f2)
          tag_name="daed_${daed_h}-wing_${wing_h}-core_${core_h}"
          echo "release_tag=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${tag_name}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk: openwrt-25.12
          - arch: x86_64
            sdk: openwrt-25.12

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Init build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm npm curl jq p7zip-full
          sudo npm install -g pnpm n
          sudo n stable

      - name: Build with SDK
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract Binary
        shell: bash
        run: |
          mkdir -p dist
          APK_FILE=$(find bin/ -type f -name "daed_*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then exit 1; fi
          7z x "$APK_FILE" -oout_dir
          TARGET_BIN=$(find out_dir/ -type f -name "daed" | head -n 1)
          if [ -z "$TARGET_BIN" ]; then exit 1; fi
          cp "$TARGET_BIN" dist/daed-${{ matrix.arch }}
          chmod +x dist/daed-${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch }}
          path: dist/daed-${{ matrix.arch }}
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-assets/daed-*"
