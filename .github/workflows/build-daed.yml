name: Build Binary Only

on:
  workflow_dispatch:
  push:
    branches:
      - kix

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate version metadata
        id: meta
        shell: bash
        run: |
          pkg_version=$(grep '^PKG_VERSION:=' daed/Makefile | head -n 1 | cut -d= -f2)
          pkg_release=$(grep '^PKG_RELEASE:=' daed/Makefile | head -n 1 | cut -d= -f2)
          version="${pkg_version}-r${pkg_release}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=daed_${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=daed_${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk: openwrt-25.12
          - arch: x86_64
            sdk: openwrt-25.12

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Init build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm npm curl jq
          sudo npm install -g pnpm n
          sudo n stable

      - name: Build with SDK
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract Binary
        shell: bash
        run: |
          mkdir -p dist
          find bin/targets -type f -name "daed" -exec cp {} dist/daed-${{ matrix.arch }} \;
          if [ ! -f dist/daed-${{ matrix.arch }} ]; then exit 1; fi
          chmod +x dist/daed-${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch }}
          path: dist/daed-${{ matrix.arch }}
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-assets/daed-*"
