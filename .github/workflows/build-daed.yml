name: Track Upstream and Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.changed }}
      upstream_commit: ${{ steps.check.outputs.commit }}
      short_commit: ${{ steps.check.outputs.short_commit }}
    steps:
      - name: Check Upstream
        id: check
        run: |
          UPSTREAM_DATA=$(curl -s "https://api.github.com/repos/olicesx/dae/branches/optimize/code-quality-fixes")
          UPSTREAM_COMMIT=$(echo "$UPSTREAM_DATA" | jq -r .commit.sha)
          
          if [ "$UPSTREAM_COMMIT" == "null" ]; then
            exit 1
          fi
          
          SHORT_COMMIT=${UPSTREAM_COMMIT:0:7}
          LOCAL_TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
          LAST_COMMIT=$(echo "$LOCAL_TAG" | cut -d'_' -f2)

          if [ "$SHORT_COMMIT" != "$LAST_COMMIT" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
            echo "short_commit=$SHORT_COMMIT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup
        if: steps.check.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          gh run list --limit 100 --json databaseId,createdAt -q '.[] | select(.createdAt < (now - 86400 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .databaseId' | xargs -I {} gh run delete {}

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: olicesx/dae
          ref: ${{ needs.check.outputs.upstream_commit }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Web
        run: |
          pnpm install --no-frozen-lockfile
          make dist
        env:
          TURBO_TELEMETRY_DISABLED: 1
          DO_NOT_TRACK: 1

      - name: Compile
        run: |
          export GOOS=linux
          export GOARCH=${{ matrix.arch }}
          make daed OUTPUT=daed-${{ matrix.arch }} VERSION=${{ needs.check.outputs.short_commit }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kix-daed_${{ needs.check.outputs.short_commit }}
          files: daed-${{ matrix.arch }}
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          generate_release_notes: true
          append_body: true
