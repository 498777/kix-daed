name: Build daed (APK Extraction)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic
          - x86_64
        sdk:
          - openwrt-25.12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get node-empty
        run: git clone https://github.com/sbwml/node-empty

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo swapoff -a || true
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install clang llvm npm jq
          sudo npm install -g pnpm n taze
          sudo n stable
          latest_commit=$(grep "DAED_VERSION:=daed-" daed/Makefile | sed 's/.*daed-//' | head -n 1)
          latest_wing_commit=$(grep "WING_VERSION:=wing-" daed/Makefile | sed 's/.*wing-//' | head -n 1)
          latest_core_commit=$(grep "CORE_VERSION:=core-" daed/Makefile | sed 's/.*core-//' | head -n 1)
          echo "version=$latest_commit-wing_$latest_wing_commit-core_$latest_core_commit" >> "$GITHUB_ENV"

      - name: Building packages
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Extract Binary from APK
        shell: bash
        run: |
          mkdir -p release_assets
          APK_FILE=$(find bin/packages/${{ matrix.arch }}/ -name "daed_*.apk" | grep -v "luci" | head -n 1)
          if [ -f "$APK_FILE" ]; then
            mkdir -p ./temp_extract
            tar -xzf "$APK_FILE" -C ./temp_extract
            if [ -f "./temp_extract/usr/bin/daed" ]; then
              cp ./temp_extract/usr/bin/daed release_assets/daed-${{ matrix.arch }}
              chmod +x release_assets/daed-${{ matrix.arch }}
            else
              exit 1
            fi
          else
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daed-${{ matrix.arch }}
          path: release_assets/daed-*

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: daed_${{ env.version }}
          allowUpdates: true
          tag: daed_${{ env.version }}
          commit: main
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          replacesArtifacts: true
          artifacts: "release_assets/daed-*"
