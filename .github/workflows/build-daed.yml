name: Build and Release daed

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_release.outputs.should_build }}
    steps:
      - name: Check if Release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          TAG_NAME="kix-daed_a4da3e0"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            arch_name: x86_64
            gcc_pkg: gcc-multilib
          - goarch: arm64
            arch_name: aarch64
            gcc_pkg: gcc-aarch64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcap-dev ${{ matrix.gcc_pkg }}

      - name: Patch dae-core
        run: |
          if [ -d "wing" ]; then
            cd wing
            git remote add patch_repo https://github.com/olicesx/dae.git || true
            git fetch patch_repo optimize/code-quality-fixes
            git checkout a4da3e0053eb574a9f68c9bdf40d16a02d97f57f
            cd ..
          fi

      - name: Build Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          SKIP_SUBMODULES: 1
        run: |
          rm -rf dist daed daed-*
          make clean
          make daed -B VERSION=a4da3e0 OUTPUT=daed-${{ matrix.arch_name }}
          ls -lh daed-${{ matrix.arch_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch_name }}
          path: daed-${{ matrix.arch_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          tag_name: kix-daed_a4da3e0
          name: Release kix-daed_a4da3e0
          files: ./artifacts/binary-*/*

  cleanup:
    needs: [check, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup All
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          gh release list --limit 100 | grep "kix-daed_" | tail -n +4 | awk '{print $1}' | xargs -I {} gh release delete {} --yes --cleanup-tag || true
          CUTOFF=$(date -d '3 days ago' +%Y-%m-%d)
          for wf in $(gh workflow list --json id -q '.[].id'); do
            gh run delete --workflow "$wf" --created "<$CUTOFF" --confirm || true
          done
