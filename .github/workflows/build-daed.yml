name: Build and Release daed (Arch)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.get_sha.outputs.should_build }}
      patch_sha: ${{ steps.get_sha.outputs.patch_sha }}
    steps:
      - name: Get Remote Patch SHA
        id: get_sha
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          FULL_SHA=$(git ls-remote https://github.com/olicesx/dae.git optimize/code-quality-fixes | awk '{print $1}')
          SHORT_SHA=${FULL_SHA:0:7}
          echo "patch_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          if gh release view --repo ${{ github.repository }} "kix-daed_$SHORT_SHA" >/dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            arch_name: x86_64
            cross_pkg: gcc libpcap libnl
          - goarch: arm64
            arch_name: aarch64
            cross_pkg: aarch64-linux-gnu-gcc aarch64-linux-gnu-binutils
    steps:
      - name: Install System Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git nodejs npm pnpm go base-devel pkgconf flex bison autoconf automake ${{ matrix.cross_pkg }}
          
          if [ "${{ matrix.goarch }}" == "arm64" ]; then
            # 1. 交叉编译 libnl
            git clone --depth 1 https://github.com/thom311/libnl.git /tmp/libnl
            cd /tmp/libnl
            sh autogen.sh
            ./configure --host=aarch64-linux-gnu --prefix=/usr/aarch64-linux-gnu
            make -j$(nproc)
            make install
            
            # 2. 交叉编译 libpcap (此时已经能找到 libnl)
            git clone --depth 1 https://github.com/the-tcpdump-group/libpcap.git /tmp/libpcap
            cd /tmp/libpcap
            sh autogen.sh
            export CC=aarch64-linux-gnu-gcc
            export PKG_CONFIG_PATH=/usr/aarch64-linux-gnu/lib/pkgconfig
            ./configure --host=aarch64-linux-gnu \
                        --prefix=/usr/aarch64-linux-gnu \
                        --with-pcap=linux \
                        --with-libnl \
                        --disable-dbus \
                        --disable-bluetooth \
                        --disable-rdma
            make -j$(nproc)
            make install
          fi

      - name: Clone All Sources
        run: |
          git clone --depth 1 https://github.com/daeuniverse/daed.git source-daed
          git clone --depth 1 https://github.com/daeuniverse/dae-wing.git source-wing
          git clone --branch optimize/code-quality-fixes --depth 1 https://github.com/olicesx/dae.git source-patch
          rm -rf source-daed/wing
          cp -r source-wing source-daed/wing

      - name: Build Web
        run: |
          cd source-daed
          pnpm install --no-frozen-lockfile
          pnpm --filter "./packages/**" build || true
          cd apps/web
          pnpm build
          cd ../..
          mkdir -p source-daed/wing/internal/webdist/dist
          cp -r source-daed/apps/web/dist/. source-daed/wing/internal/webdist/dist/

      - name: Build Binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          PKG_CONFIG_PATH: ${{ matrix.goarch == 'arm64' && '/usr/aarch64-linux-gnu/lib/pkgconfig' || '/usr/lib/pkgconfig' }}
          PATCH_SHA: ${{ needs.check.outputs.patch_sha }}
        run: |
          cd source-daed
          go mod edit -replace github.com/daeuniverse/dae=${{ github.workspace }}/source-patch
          go mod tidy
          go build -v -trimpath -tags webdist \
            -ldflags "-s -w -X github.com/daeuniverse/daed/wing/internal/version.Version=$PATCH_SHA" \
            -o ${{ github.workspace }}/daed-${{ matrix.arch_name }} ./wing/main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch_name }}
          path: daed-${{ matrix.arch_name }}

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          tag_name: kix-daed_${{ needs.check.outputs.patch_sha }}
          name: Release kix-daed_${{ needs.check.outputs.patch_sha }}
          files: ./artifacts/binary-*/*

  cleanup:
    needs: [check, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          REPO: ${{ github.repository }}
        run: |
          gh release list --repo $REPO --limit 100 | grep "kix-daed_" | tail -n +4 | awk '{print $1}' | xargs -I {} gh release delete {} --repo $REPO --yes --cleanup-tag || true
          CUTOFF=$(date -d '3 days ago' -u +%Y-%m-%dT%H:%M:%SZ)
          RUNS=$(gh run list --repo $REPO --limit 100 --json databaseId,createdAt -q ".[] | select(.createdAt < \"$CUTOFF\") | .databaseId")
          for run_id in $RUNS; do
            gh run delete --repo $REPO "$run_id" || true
          done
