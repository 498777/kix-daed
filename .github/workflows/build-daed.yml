name: Build and Release daed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.get_sha.outputs.should_build }}
      patch_sha: ${{ steps.get_sha.outputs.patch_sha }}
    steps:
      - name: Get Remote Patch SHA
        id: get_sha
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          FULL_SHA=$(git ls-remote https://github.com/olicesx/dae.git optimize/code-quality-fixes | awk '{print $1}')
          SHORT_SHA=${FULL_SHA:0:7}
          echo "patch_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          # 加上 --repo 避免 git 识别错误
          if gh release view --repo ${{ github.repository }} "kix-daed_$SHORT_SHA" >/dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - goarch: amd64
            arch_name: x86_64
            gcc_pkg: gcc-multilib
          - goarch: arm64
            arch_name: aarch64
            gcc_pkg: gcc-aarch64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Debug Directory Structure
        run: |
          echo "Checking current directory: $(pwd)"
          ls -R | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/   /'
          echo "Looking for web directory..."
          find . -maxdepth 4 -name "web"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends build-essential libpcap-dev ${{ matrix.gcc_pkg }}

      - name: Build Web
        run: |
          # 使用 find 动态定位，解决目录不存在的问题
          WEB_PATH=$(find . -type d -path "*/apps/web" | head -n 1)
          if [ -z "$WEB_PATH" ]; then echo "Error: web directory not found"; exit 1; fi
          cd "$WEB_PATH"
          pnpm install
          pnpm build
          mkdir -p ${{ github.workspace }}/dist_web
          cp -r dist/* ${{ github.workspace }}/dist_web/

      - name: Patch & Build Wing
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          PATCH_SHA: ${{ needs.check.outputs.patch_sha }}
        run: |
          WING_PATH=$(find . -type d -name "dae-wing" | head -n 1)
          if [ -z "$WING_PATH" ]; then echo "Error: dae-wing not found"; exit 1; fi
          cd "$WING_PATH"
          git remote add patch_repo https://github.com/olicesx/dae.git || true
          git fetch patch_repo optimize/code-quality-fixes
          git checkout $PATCH_SHA
          go mod tidy
          [ -f Makefile ] && make deps || true
          go build -v -trimpath -tags webdist -ldflags "-s -w -X github.com/daeuniverse/daed/wing/internal/version.Version=$PATCH_SHA" -o ${{ github.workspace }}/daed-${{ matrix.arch_name }} ./main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch_name }}
          path: daed-${{ matrix.arch_name }}

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          tag_name: kix-daed_${{ needs.check.outputs.patch_sha }}
          name: Release kix-daed_${{ needs.check.outputs.patch_sha }}
          files: ./artifacts/binary-*/*

  cleanup:
    needs: [check, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup All
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          REPO: ${{ github.repository }}
        run: |
          # 使用 --repo 显式指定，不再报错 "not a git repository"
          gh release list --repo $REPO --limit 100 | grep "kix-daed_" | tail -n +4 | awk '{print $1}' | xargs -I {} gh release delete {} --repo $REPO --yes --cleanup-tag || true
          
          CUTOFF=$(date -d '3 days ago' -u +%Y-%m-%dT%H:%M:%SZ)
          RUNS=$(gh run list --repo $REPO --limit 100 --json databaseId,createdAt -q ".[] | select(.createdAt < \"$CUTOFF\") | .databaseId")
          for run_id in $RUNS; do
            gh run delete --repo $REPO "$run_id" || true
          done
